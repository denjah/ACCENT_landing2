<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Swarm Export</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 20000;
        const SPEED_MULT = 0.2;
        const AUTO_SPIN = false;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color(); // Kept for safety, for potential references
        
        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88)); // Init Color
        }

        // CONTROL STUBS
        const PARAMS = {"glow":0.25,"drift":0.4,"spread":70};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;
            
            // Shader Time Update
            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            // SWARM LOGIC
            const count = COUNT; // Alias for user code compatibility
            for(let i=0; i<COUNT; i++) {
                 // USER CODE INJECTION START
                 const glow = addControl("glow", "Glow Intensity", 0.0, 1.0, 0.25);
                 const drift = addControl("drift", "Current Speed", 0.0, 2.0, 0.4);
                 const spread = addControl("spread", "Grid Scale", 20, 120, 70);
                 
                 const cols = Math.ceil(Math.sqrt(count * 1.6));
                 const rows = Math.floor(count / cols);
                 
                 const col = i % cols;
                 const row = Math.floor(i / cols);
                 
                 const nx = (col / (cols - 1)) - 0.5;
                 const ny = (row / (rows + 1)) - 0.5;
                 
                 const baseX = nx * spread;
                 const baseY = ny * spread * 0.62;
                 
                 const isNode = ((col % 6 === 0) && (row % 6 === 0)) ? 1.0 : 0.0;
                 const isHTrace = (row % 6 === 0) ? 1.0 : 0.0;
                 const isVTrace = (col % 6 === 0) ? 1.0 : 0.0;
                 const isTrace = Math.min(1.0, isHTrace + isVTrace);
                 
                 const tracePhase = (col * 0.18 + row * 0.24);
                 const currentFlow = Math.sin(time * drift + tracePhase) * 0.5 + 0.5;
                 const isActive = isTrace * currentFlow;
                 
                 const microJitterX = Math.sin(time * 0.12 + i * 2.71) * 0.06;
                 const microJitterY = Math.cos(time * 0.09 + i * 1.61) * 0.06;
                 const floatZ = isNode * Math.sin(time * 0.3 + i * 0.5) * 0.4;
                 
                 const x = baseX + microJitterX;
                 const y = baseY + microJitterY;
                 const z = floatZ;
                 
                 target.set(x, y, z);
                 
                 const baseL = 0.08 + isTrace * 0.09 + isNode * 0.12;
                 const activeBoost = isActive * glow * 0.22;
                 const L = Math.min(0.95, baseL + activeBoost);
                 
                 const redShift = isActive * glow * 0.72;
                 const H = 0.62 - redShift * 0.62;
                 const S = 0.08 + isTrace * 0.06 + redShift * 0.55;
                 
                 color.setHSL(H, S, L);
                 
                 if (i === 0) setInfo(
                   "PCB SCHEMATIC",
                   "Monochrome circuit board traces with slow current flow. Red accent highlights active copper paths."
                 );
                 // USER CODE INJECTION END

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color); // Fix: Use 'color' which user modifies
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
