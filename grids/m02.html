<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Swarm Export</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 15000;
        const SPEED_MULT = 0.3;
        const AUTO_SPIN = false;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color(); // Kept for safety, for potential references
        
        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88)); // Init Color
        }

        // CONTROL STUBS
        const PARAMS = {"spread":137.6,"depth":70.5,"drift":0.22,"pulse":0.165,"diag":0.14,"warp":0.15};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;
            
            // Shader Time Update
            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            // SWARM LOGIC
            const count = COUNT; // Alias for user code compatibility
            for(let i=0; i<COUNT; i++) {
                 // USER CODE INJECTION START
                 const spread = addControl("spread", "Grid Span", 80, 320, 180);
                 const depth = addControl("depth", "Layer Depth", 10, 120, 44);
                 const drift = addControl("drift", "Signal Drift", 0, 2, 0.22);
                 const pulse = addControl("pulse", "Active Pulse", 0, 1.5, 0.35);
                 const diag = addControl("diag", "Diagonal Bias", 0, 1, 0.18);
                 const warp = addControl("warp", "Layout Warp", 0, 1, 0.12);
                 
                 const safeCount = count > 1 ? count : 2;
                 const n = i / (safeCount - 1);
                 const cols = Math.max(2, (spread * 0.18) | 0);
                 const rows = Math.max(2, ((safeCount / cols) | 0) + 1);
                 const col = i % cols;
                 const row = (i / cols) | 0;
                 
                 const u = cols > 1 ? col / (cols - 1) : 0;
                 const v = rows > 1 ? row / (rows - 1) : 0;
                 
                 const gx = (u - 0.5) * spread * 2;
                 const gy = (v - 0.5) * spread * 2;
                 
                 const cellX = spread * 2 / cols;
                 const cellY = spread * 2 / rows;
                 
                 const pinMaskA = Math.sin(col * 12.9898 + row * 78.233);
                 const pinMaskB = Math.sin(col * 5.173 + row * 19.917 + 1.7);
                 const pinRect = Math.abs(pinMaskA) > 0.72 ? 1 : 0;
                 const pinSquare = Math.abs(pinMaskB) > 0.82 ? 1 : 0;
                 const nodeMask = pinRect + pinSquare - pinRect * pinSquare;
                 
                 const lineMix = Math.sin(row * 0.45 + time * drift * 0.21) + 0.55 * Math.sin(col * 0.31 - time * drift * 0.17);
                 const orient = Math.abs(lineMix);
                 const diagGate = Math.abs(Math.sin(col * 0.73 + row * 0.41 + time * drift * 0.13));
                 
                 const localA = Math.sin(i * 1.618 + time * drift * 0.8);
                 const localB = Math.cos(i * 2.173 - time * drift * 0.6);
                 const localC = Math.sin(i * 0.037 + row * 0.19 + col * 0.11);
                 
                 const thinX = cellX * (0.05 + 0.08 * orient);
                 const thinY = cellY * (0.05 + 0.08 * (1 - orient));
                 const padX = cellX * (0.18 + 0.16 * Math.abs(pinMaskA));
                 const padY = cellY * (0.18 + 0.16 * Math.abs(pinMaskB));
                 
                 let x = gx;
                 let y = gy;
                 
                 if (nodeMask > 0.5) {
                 x += localA * padX;
                 y += localB * padY;
                 } else {
                 const dsel = diag * diagGate;
                 const hx = localA * thinX;
                 const hy = localB * thinY;
                 const dx = localC * (cellX + cellY) * 0.16;
                 x += hx * (1 - dsel) + dx * dsel;
                 y += hy * (1 - dsel) + dx * (dsel * 0.75);
                 }
                 
                 const field = Math.sin(gx * 0.038 + time * drift * 0.7) * Math.cos(gy * 0.042 - time * drift * 0.6);
                 const bus = Math.sin(row * 0.19 + time * drift * 1.2) * Math.cos(col * 0.17 - time * drift * 0.9);
                 const activity = Math.pow(0.5 + 0.5 * Math.sin(8 * field + 5 * bus + n * 20 - time * (0.8 + pulse * 1.7)), 3);
                 const active = activity * (0.35 + 0.65 * (1 - nodeMask * 0.35));
                 
                 const zBase = depth * (activity - 0.5) * 0.18;
                 const zLayer = depth * (
                 0.42 * Math.sin(col * 0.09 + time * drift * 0.23) +
                 0.32 * Math.cos(row * 0.07 - time * drift * 0.19)
                 );
                 const zWarp = warp * depth * (
                 0.55 * Math.sin((gx + gy) * 0.024 + time * drift * 0.31) +
                 0.45 * Math.cos((gx - gy) * 0.019 - time * drift * 0.27)
                 );
                 const z = zBase + zLayer * 0.12 + zWarp * 0.22;
                 
                 target.set(x, y, z);
                 
                 const red = active * (0.08 + pulse * 0.22);
                 const light = 0.07 + nodeMask * 0.1 + active * 0.12;
                 color.setRGB(light + red, light * (1 - red * 3.5), light * (1 - red * 3.5));
                 
                 if (i === 0) {
                 setInfo(
                 "Microchip Signal Blueprint",
                 "Dark monochrome chip-routing field with pad-like nodes, thin orthogonal traces, and faint red activity pulses."
                 );
                 annotate("hub", target, "signal mesh");
                 }
                 // USER CODE INJECTION END

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color); // Fix: Use 'color' which user modifies
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
